<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CreditGuard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111827;
            --bg-card: #151d2e;
            --bg-card-hover: #1a2438;
            --bg-elevated: #1e293b;
            --border: #1e293b;
            --border-subtle: #162032;
            --text-primary: #e2e8f0;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --accent: #22d3ee;
            --accent-dim: rgba(34, 211, 238, 0.1);
            --accent-glow: rgba(34, 211, 238, 0.15);
            --green: #34d399;
            --green-dim: rgba(52, 211, 153, 0.12);
            --yellow: #fbbf24;
            --yellow-dim: rgba(251, 191, 36, 0.12);
            --red: #f87171;
            --red-dim: rgba(248, 113, 113, 0.12);
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Top bar */
        .topbar {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .topbar-brand {
            font-family: var(--font-mono);
            font-weight: 600;
            font-size: 0.8rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--accent);
            text-decoration: none;
            margin-right: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .topbar-brand::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .topbar-nav {
            display: flex;
            gap: 0;
            height: 100%;
        }

        .topbar-nav a {
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            font-size: 0.82rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            height: 100%;
            border-bottom: 2px solid transparent;
            transition: color 0.15s, border-color 0.2s;
            letter-spacing: 0.01em;
        }

        .topbar-nav a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .topbar-nav a.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .topbar-right {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* Layout */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Page header */
        .page-header {
            margin-bottom: 1.75rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .page-header h1 {
            font-size: 1.35rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .page-header .subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 6px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 0.5rem;
            transition: background 0.15s, border-color 0.15s;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.65rem;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .badge::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .badge-pending {
            background: var(--yellow-dim);
            color: var(--yellow);
        }
        .badge-pending::before { background: var(--yellow); }

        .badge-approved {
            background: var(--green-dim);
            color: var(--green);
        }
        .badge-approved::before { background: var(--green); }

        .badge-rejected {
            background: var(--red-dim);
            color: var(--red);
        }
        .badge-rejected::before { background: var(--red); }

        /* Data display */
        .mono {
            font-family: var(--font-mono);
        }

        .amount {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--text-primary);
        }

        .amount-large {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .label {
            font-size: 0.72rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.84rem;
        }

        .data-table thead th {
            text-align: left;
            padding: 0.65rem 1rem;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.1s;
        }

        .data-table tbody tr:hover {
            background: var(--bg-card-hover);
        }

        .data-table td {
            padding: 0.6rem 1rem;
            color: var(--text-secondary);
        }

        .data-table td.mono {
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }

        .data-table td a {
            color: var(--accent);
            text-decoration: none;
        }

        .data-table td a:hover {
            text-decoration: underline;
        }

        .text-right { text-align: right; }

        /* Category pills */
        .cat-pill {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.72rem;
            font-family: var(--font-mono);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
        }

        .cat-pill.high-risk {
            background: var(--red-dim);
            color: var(--red);
        }

        /* Country flags */
        .country-code {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Online indicator */
        .online-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 4px var(--green);
        }

        .offline-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.1rem;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(34, 211, 238, 0.2);
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn:hover {
            background: rgba(34, 211, 238, 0.18);
            border-color: rgba(34, 211, 238, 0.4);
            box-shadow: 0 0 12px rgba(34, 211, 238, 0.1);
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg-primary);
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-primary:hover {
            background: #06b6d4;
            border-color: #06b6d4;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.25);
        }

        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.88rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 1.5rem;
        }

        .form-full { grid-column: 1 / -1; }

        /* Detail grid */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.25rem;
        }

        .detail-item .label { margin-bottom: 0.2rem; }
        .detail-item .value {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        /* Links */
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state code {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            background: var(--bg-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            color: var(--text-secondary);
        }

        /* Subtle grain texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.015;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            z-index: 9999;
        }

        /* Animations */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fade-up 0.3s ease-out both;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="{% url 'creditapp:transactions' %}" class="topbar-brand">CreditGuard</a>
        <nav class="topbar-nav">
            <a href="{% url 'creditapp:transactions' %}" class="{% block nav_transactions %}{% endblock %}">Transactions</a>
            <a href="{% url 'creditapp:index' %}" class="{% block nav_applications %}{% endblock %}">Credit Applications</a>
            <a href="{% url 'creditapp:apply' %}" class="{% block nav_apply %}{% endblock %}">Apply for Credit</a>
        </nav>
        <div class="topbar-right">
            <span id="clock"></span>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m + ':' + s + ' UTC';
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
