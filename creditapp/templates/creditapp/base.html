<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Banamox{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bmx-red: #D50032;
            --bmx-red-bright: #E8003A;
            --bmx-red-dim: rgba(213, 0, 50, 0.12);
            --bmx-red-glow: rgba(213, 0, 50, 0.2);
            --bmx-navy: #0C1A3A;
            --bmx-navy-light: #132044;
            --bmx-gold: #C9A84C;
            --bmx-gold-dim: rgba(201, 168, 76, 0.12);
            --bg-primary: #080C18;
            --bg-secondary: #0C1226;
            --bg-card: #101830;
            --bg-card-hover: #141E3A;
            --border: #1A2648;
            --border-subtle: #141E38;
            --text-primary: #E8ECF4;
            --text-secondary: #8B9BC0;
            --text-muted: #4A5A82;
            --green: #2ECC71;
            --green-dim: rgba(46, 204, 113, 0.12);
            --yellow: #F1C40F;
            --yellow-dim: rgba(241, 196, 15, 0.12);
            --red: #E74C3C;
            --red-dim: rgba(231, 76, 60, 0.12);
            --font-body: 'Source Sans 3', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Top bar */
        .topbar {
            background: var(--bmx-navy);
            border-bottom: 2px solid var(--bmx-red);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-family: var(--font-body);
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: #fff;
            text-decoration: none;
            margin-right: 2.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .topbar-brand::before {
            content: '';
            display: inline-block;
            width: 22px;
            height: 22px;
            background: var(--bmx-red);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(213, 0, 50, 0.4);
        }

        .topbar-nav {
            display: flex;
            gap: 0;
            height: 100%;
        }

        .topbar-nav a {
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            font-size: 0.84rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            height: 100%;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: color 0.15s, border-color 0.2s;
        }

        .topbar-nav a:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.03);
        }

        .topbar-nav a.active {
            color: #fff;
            border-bottom-color: var(--bmx-red);
        }

        .topbar-right {
            margin-left: auto;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 0.03em;
        }

        /* Layout */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Page header */
        .page-header {
            margin-bottom: 1.75rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-subtle);
        }

        .page-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.01em;
        }

        .page-header .subtitle {
            font-size: 0.84rem;
            color: var(--text-muted);
            margin-top: 0.35rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border-subtle);
            border-radius: 4px;
            padding: 1.25rem 1.5rem;
            margin-bottom: 0.5rem;
            transition: background 0.15s, border-color 0.15s;
        }

        .card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border);
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.65rem;
            border-radius: 3px;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .badge::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .badge-pending {
            background: var(--yellow-dim);
            color: var(--yellow);
        }
        .badge-pending::before { background: var(--yellow); }

        .badge-approved {
            background: var(--green-dim);
            color: var(--green);
        }
        .badge-approved::before { background: var(--green); }

        .badge-rejected {
            background: var(--red-dim);
            color: var(--red);
        }
        .badge-rejected::before { background: var(--red); }

        /* Data display */
        .mono {
            font-family: var(--font-mono);
        }

        .amount {
            font-family: var(--font-mono);
            font-weight: 600;
            color: var(--text-primary);
        }

        .amount-large {
            font-family: var(--font-mono);
            font-size: 1.4rem;
            font-weight: 600;
            color: #fff;
        }

        .label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.3rem;
        }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.84rem;
        }

        .data-table thead th {
            text-align: left;
            padding: 0.65rem 1rem;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--bmx-gold);
            background: var(--bmx-navy);
            border-bottom: 1px solid var(--border);
        }

        .data-table tbody tr {
            border-bottom: 1px solid var(--border-subtle);
            transition: background 0.1s;
        }

        .data-table tbody tr:hover {
            background: var(--bg-card-hover);
        }

        .data-table td {
            padding: 0.6rem 1rem;
            color: var(--text-secondary);
        }

        .data-table td.mono {
            font-family: var(--font-mono);
            font-size: 0.78rem;
        }

        .data-table td a {
            color: var(--bmx-gold);
            text-decoration: none;
        }

        .data-table td a:hover {
            color: #ddb85e;
            text-decoration: underline;
        }

        .text-right { text-align: right; }

        /* Category pills */
        .cat-pill {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 3px;
            font-size: 0.72rem;
            font-family: var(--font-mono);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-secondary);
        }

        .cat-pill.high-risk {
            background: var(--bmx-red-dim);
            color: var(--bmx-red-bright);
        }

        /* Country flags */
        .country-code {
            font-family: var(--font-mono);
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.5rem 1.1rem;
            background: var(--bmx-red-dim);
            color: var(--bmx-red-bright);
            border: 1px solid rgba(213, 0, 50, 0.25);
            border-radius: 4px;
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.15s;
        }

        .btn:hover {
            background: rgba(213, 0, 50, 0.2);
            border-color: rgba(213, 0, 50, 0.45);
            box-shadow: 0 0 12px rgba(213, 0, 50, 0.15);
            color: var(--bmx-red-bright);
        }

        .btn-primary {
            background: var(--bmx-red);
            color: #fff;
            border-color: var(--bmx-red);
        }

        .btn-primary:hover {
            background: var(--bmx-red-bright);
            border-color: var(--bmx-red-bright);
            box-shadow: 0 0 20px rgba(213, 0, 50, 0.3);
            color: #fff;
        }

        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.75rem;
        }

        /* Forms */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.65rem 0.85rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-primary);
            font-family: var(--font-body);
            font-size: 0.88rem;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--bmx-red);
            box-shadow: 0 0 0 3px var(--bmx-red-dim);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0 1.5rem;
        }

        .form-full { grid-column: 1 / -1; }

        /* Detail grid */
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 1.25rem;
        }

        .detail-item .label { margin-bottom: 0.2rem; }
        .detail-item .value {
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        /* Links */
        a { color: var(--bmx-gold); text-decoration: none; }
        a:hover { color: #ddb85e; text-decoration: underline; }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state code {
            font-family: var(--font-mono);
            font-size: 0.78rem;
            background: var(--bg-secondary);
            padding: 0.25rem 0.5rem;
            border-radius: 3px;
            color: var(--text-secondary);
        }

        /* Subtle grain texture */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.02;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            z-index: 9999;
        }

        /* Animations */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fade-up 0.3s ease-out both;
        }
    </style>
</head>
<body>
    <header class="topbar">
        <a href="{% url 'creditapp:transactions' %}" class="topbar-brand">Banamox</a>
        <nav class="topbar-nav">
            <a href="{% url 'creditapp:transactions' %}" class="{% block nav_transactions %}{% endblock %}">Transactions</a>
            <a href="{% url 'creditapp:index' %}" class="{% block nav_applications %}{% endblock %}">Credit Applications</a>
            <a href="{% url 'creditapp:apply' %}" class="{% block nav_apply %}{% endblock %}">Apply for Credit</a>
        </nav>
        <div class="topbar-right">
            <span id="clock"></span>
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = h + ':' + m + ':' + s + ' UTC';
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
